<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MasterMC — Panel de Control</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg:      #0f1117;
      --card:    #1a1d27;
      --border:  #2a2d3e;
      --green:   #4ade80;
      --red:     #f87171;
      --yellow:  #fbbf24;
      --blue:    #60a5fa;
      --purple:  #a78bfa;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a1d27 0%, #0f1117 70%);
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .login-box .logo { font-size: 48px; margin-bottom: 12px; }
    .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-box p  { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--purple); }
    .login-box button {
      width: 100%;
      background: var(--purple);
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .login-box button:hover { opacity: .85; }
    #login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── PANEL ── */
    #panel { display: none; }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header .subtitle { color: var(--muted); font-size: 13px; }
    .status-badge {
      margin-left: auto;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .status-badge.online  { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid var(--green); }
    .status-badge.offline { background: rgba(248,113,113,.15); color: var(--red);   border: 1px solid var(--red); }

    .grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── TARJETAS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── STATS ── */
    .stats-card { grid-column: 1; grid-row: 1; }
    .stat-row { display: flex; flex-direction: column; gap: 14px; }
    .stat-item label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    .bar-wrap {
      background: var(--bg);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      border-radius: 6px;
      transition: width .5s ease;
    }
    .bar.health { background: linear-gradient(90deg, #f87171, #ef4444); }
    .bar.food   { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pos-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 13px;
      color: var(--blue);
      margin-top: 4px;
    }

    /* ── INVENTARIO ── */
    .inventory-card { grid-column: 2; grid-row: 1; }
    .inv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
    }
    .inv-grid::-webkit-scrollbar { width: 4px; }
    .inv-grid::-webkit-scrollbar-track { background: var(--bg); }
    .inv-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .inv-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
      font-size: 11px;
      transition: border-color .2s;
    }
    .inv-item:hover { border-color: var(--purple); }
    .inv-item .icon { font-size: 22px; margin-bottom: 4px; }
    .inv-item .name {
      color: var(--text);
      word-break: break-all;
      line-height: 1.3;
    }
    .inv-item .count {
      color: var(--yellow);
      font-weight: 700;
      margin-top: 2px;
    }
    .inv-empty { color: var(--muted); font-size: 13px; padding: 20px 0; text-align: center; }

    /* ── CHAT ── */
    .chat-card {
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      height: 360px;
    }
    .chat-log {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .chat-log::-webkit-scrollbar { width: 4px; }
    .chat-log::-webkit-scrollbar-track { background: var(--bg); }
    .chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .chat-line { display: flex; gap: 8px; padding: 2px 0; }
    .chat-line .time { color: var(--muted); flex-shrink: 0; }
    .chat-line .text { color: var(--text); word-break: break-word; }
    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    .chat-input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .chat-input-row input:focus { border-color: var(--purple); }
    .chat-input-row input::placeholder { color: var(--muted); }
    .chat-input-row button {
      background: var(--purple);
      border: none;
      border-radius: 8px;
      padding: 11px 22px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .chat-input-row button:hover { opacity: .85; }
    .chat-input-row button:disabled { opacity: .4; cursor: not-allowed; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .inventory-card { grid-column: 1; grid-row: 2; }
      .chat-card      { grid-row: 3; }
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🤖</div>
    <h1>MasterMC Panel</h1>
    <p>Ingresa tu contraseña para continuar</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" autocomplete="current-password"/>
    <button onclick="doLogin()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ══════════════ PANEL ══════════════ -->
<div id="panel">
  <header>
    <div class="logo">🤖</div>
    <div>
      <h1>MasterMC Bot</h1>
      <div class="subtitle">estelar_oficial.aternos.me:52863</div>
    </div>
    <div class="status-badge offline" id="status-badge">⬤ Desconectado</div>
  </header>

  <div class="grid">

    <!-- ── Stats ── -->
    <div class="card stats-card">
      <h2>❤️ Estado del Bot</h2>
      <div class="stat-row">

        <div class="stat-item">
          <label>Salud</label>
          <div class="stat-value" id="health-val">0 / 20</div>
          <div class="bar-wrap">
            <div class="bar health" id="health-bar" style="width:0%"></div>
          </div>
        </div>

        <div class="stat-item">
          <label>Hambre</label>
          <div class="stat-value" id="food-val">0 / 20</div>
          <div class="bar-wrap">
            <div class="bar food" id="food-bar" style="width:0%"></div>
          </div>
        </div>

        <div class="stat-item">
          <label>Posición</label>
          <div class="pos-box" id="position">X: — Y: — Z: —</div>
        </div>

        <div class="stat-item">
          <label>Estado</label>
          <div id="bot-status" style="font-size:14px; color: var(--muted);">—</div>
        </div>

      </div>
    </div>

    <!-- ── Inventario ── -->
    <div class="card inventory-card">
      <h2>🎒 Inventario</h2>
      <div class="inv-grid" id="inv-grid">
        <div class="inv-empty">Sin items</div>
      </div>
    </div>

    <!-- ── Chat ── -->
    <div class="card chat-card">
      <h2>💬 Chat del Servidor</h2>
      <div class="chat-log" id="chat-log"></div>
      <div class="chat-input-row">
        <input
          type="text"
          id="chat-input"
          placeholder="Escribe un mensaje como MasterMC..."
          maxlength="255"
          disabled
        />
        <button id="send-btn" onclick="sendChat()" disabled>Enviar</button>
      </div>
    </div>

  </div>
</div>

<script>
// ══ LOGIN ══════════════════════════════════════════════════════
let authenticated = false;

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const err = document.getElementById('login-error');
  err.textContent = '';

  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json();
    if (data.ok) {
      authenticated = true;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      initSocket();
    } else {
      err.textContent = '❌ Contraseña incorrecta';
    }
  } catch {
    err.textContent = '❌ Error de conexión';
  }
}

// ══ SOCKET.IO ══════════════════════════════════════════════════
function initSocket() {
  const socket = io();

  socket.on('state', (state) => {
    updateStats(state);
    updateInventory(state.inventory);
    updateStatus(state.connected, state.status);
    if (state.chatLog) renderChatHistory(state.chatLog);
  });

  socket.on('chat', (line) => {
    addChatLine(line);
  });

  // Guardar referencia global para sendChat
  window._socket = socket;
}

// ══ ACTUALIZAR UI ══════════════════════════════════════════════
function updateStats(state) {
  const hp   = Math.max(0, Math.min(20, state.health || 0));
  const food = Math.max(0, Math.min(20, state.food   || 0));

  document.getElementById('health-val').textContent = `${hp.toFixed(1)} / 20`;
  document.getElementById('food-val').textContent   = `${food} / 20`;
  document.getElementById('health-bar').style.width = `${(hp / 20) * 100}%`;
  document.getElementById('food-bar').style.width   = `${(food / 20) * 100}%`;

  const p = state.position || {};
  document.getElementById('position').textContent =
    `X: ${p.x ?? '—'}  Y: ${p.y ?? '—'}  Z: ${p.z ?? '—'}`;
}

function updateStatus(connected, statusText) {
  const badge = document.getElementById('status-badge');
  const input = document.getElementById('chat-input');
  const btn   = document.getElementById('send-btn');

  if (connected) {
    badge.className   = 'status-badge online';
    badge.textContent = '⬤ En línea';
    input.disabled    = false;
    btn.disabled      = false;
  } else {
    badge.className   = 'status-badge offline';
    badge.textContent = '⬤ Desconectado';
    input.disabled    = true;
    btn.disabled      = true;
  }
  document.getElementById('bot-status').textContent = statusText || '—';
}

// ── Iconos de items ──────────────────────────────────────────
const ITEM_ICONS = {
  sword: '⚔️', axe: '🪓', pickaxe: '⛏️', shovel: '🪣',
  bow: '🏹', shield: '🛡️', helmet: '🪖', chestplate: '🧥',
  leggings: '👖', boots: '👟', apple: '🍎', bread: '🍞',
  beef: '🥩', porkchop: '🥓', chicken: '🍗', carrot: '🥕',
  potato: '🥔', fish: '🐟', salmon: '🐠', cod: '🐟',
  coal: '🪨', iron: '🔩', gold: '🥇', diamond: '💎',
  emerald: '💚', netherite: '🖤', torch: '🔦', chest: '📦',
  crafting: '🔨', furnace: '🔥', log: '🪵', wood: '🪵',
  stone: '🪨', sand: '🏖️', dirt: '🟫', grass: '🌿',
  glass: '🔲', wool: '🐑', leather: '🟤', string: '🧵',
  arrow: '➡️', bone: '🦴', egg: '🥚', feather: '🪶',
  ink: '🖊️', book: '📖', map: '🗺️', compass: '🧭',
  clock: '⏰', lantern: '🏮', flower: '🌸', seed: '🌱',
  bucket: '🪣', water: '💧', lava: '🔥', milk: '🥛',
  default: '📦',
};

function getIcon(name) {
  for (const [key, icon] of Object.entries(ITEM_ICONS)) {
    if (name.includes(key)) return icon;
  }
  return ITEM_ICONS.default;
}

function updateInventory(items) {
  const grid = document.getElementById('inv-grid');
  if (!items || items.length === 0) {
    grid.innerHTML = '<div class="inv-empty">Inventario vacío</div>';
    return;
  }
  grid.innerHTML = items.map(item => {
    const displayName = item.name.replace(/_/g, ' ');
    const icon = getIcon(item.name);
    return `
      <div class="inv-item" title="${item.name} (slot ${item.slot})">
        <div class="icon">${icon}</div>
        <div class="name">${displayName}</div>
        <div class="count">x${item.count}</div>
      </div>`;
  }).join('');
}

// ── Chat ─────────────────────────────────────────────────────
function renderChatHistory(lines) {
  const log = document.getElementById('chat-log');
  log.innerHTML = '';
  // Las líneas vienen en orden inverso (más reciente primero)
  const ordered = [...lines].reverse();
  ordered.forEach(line => appendLine(line));
  log.scrollTop = log.scrollHeight;
}

function addChatLine(line) {
  appendLine(line);
  const log = document.getElementById('chat-log');
  log.scrollTop = log.scrollHeight;
}

function appendLine(line) {
  const log  = document.getElementById('chat-log');
  const div  = document.createElement('div');
  div.className = 'chat-line';

  // Limpiar códigos de color Minecraft (§x)
  const clean = (line.text || '').replace(/§[0-9a-fk-or]/gi, '');

  div.innerHTML = `
    <span class="time">${line.time}</span>
    <span class="text">${escapeHtml(clean)}</span>
  `;
  log.appendChild(div);
  // Limitar a 100 líneas visibles
  while (log.children.length > 100) log.removeChild(log.firstChild);
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg   = input.value.trim();
  if (!msg || !window._socket) return;
  window._socket.emit('chat', msg);
  input.value = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && authenticated) {
    const input = document.getElementById('chat-input');
    if (document.activeElement === input) sendChat();
  }
});
</script>
</body>
</html>
